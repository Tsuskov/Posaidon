<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Posaidon</title>
<script>
  // set theme before first paint to avoid a flash of the wrong palette
  (function(){var t=localStorage.posaidonTheme||
    (matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");
    document.documentElement.dataset.theme=t;})();
</script>
<style>
  :root{
    --bg:#fbfbfa;
    --panel:#ffffff;
    --hover:#f4f4f3;
    --ink:#1a1a1b;
    --read:#37373a;
    --muted:#6b6b71;
    --faint:#9b9ba1;
    --line:#e8e8e6;
    --line-2:#dcdcd9;
    --ring:rgba(0,0,0,.16);
    /* one typeface everywhere (Emil's site uses a single clean sans) */
    --font:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    /* monospace is used ONLY to render the ASCII picture, which can't be proportional */
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,monospace;
    --ease:cubic-bezier(0.23,1,0.32,1);
  }
  :root[data-theme="dark"]{
    --bg:#0b0b0c;
    --panel:#161617;
    --hover:#1b1b1d;
    --ink:#ededee;
    --read:#cdced2;
    --muted:#9b9b9f;
    --faint:#69696d;
    --line:#232325;
    --line-2:#2e2e31;
    --ring:rgba(255,255,255,.18);
  }
  body.theming,body.theming *{
    transition:background-color .26s ease,color .26s ease,
               border-color .26s ease,fill .26s ease,box-shadow .26s ease!important}
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font);
    font-size:15px;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
    display:flex;flex-direction:column;align-items:center;height:100%;}
  .app{width:100%;max-width:692px;height:100%;display:flex;flex-direction:column;padding:0 24px;}

  /* ── header ── */
  header{display:flex;align-items:center;gap:9px;padding:24px 2px 18px;
    border-bottom:1px solid var(--line);}
  .mark{width:6px;height:6px;border-radius:50%;background:var(--ink)}
  h1{font-size:15px;font-weight:500;letter-spacing:-.011em;margin:0}
  header .meta{margin-left:auto;font-size:13px;color:var(--faint);
    font-variant-numeric:tabular-nums}
  .iconbtn{margin-left:12px;width:30px;height:30px;border-radius:8px;cursor:pointer;
    border:0;background:transparent;color:var(--muted);display:grid;place-items:center;
    transition:transform .14s var(--ease),color .15s var(--ease),background .15s var(--ease);}
  .iconbtn svg{width:16px;height:16px}
  @media(hover:hover) and (pointer:fine){
    .iconbtn:hover{color:var(--ink);background:var(--hover)}}
  .iconbtn:active{transform:scale(.9)}
  .i-sun{display:none}
  :root[data-theme="light"] .i-sun{display:block}
  :root[data-theme="light"] .i-moon{display:none}

  /* ── transcript ── */
  .scroll{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--line-2) transparent;
    -webkit-mask-image:linear-gradient(to bottom,transparent,#000 24px,#000 calc(100% - 16px),transparent);}
  .scroll::-webkit-scrollbar{width:8px}
  .scroll::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:8px;border:2px solid var(--bg)}
  #transcript{padding:32px 2px 16px;display:flex;flex-direction:column;gap:36px}

  .passage{opacity:0;transform:translateY(8px);animation:rise .42s var(--ease) forwards}
  .reading{font-size:17px;line-height:1.72;white-space:pre-wrap;word-break:break-word}
  .seed{color:var(--ink);font-weight:500}        /* the line you offered */
  .flow{color:var(--read)}                         /* the deep's continuation */
  .cursor{display:inline-block;width:.5ch;color:var(--ink);
    animation:blink 1.1s steps(1) infinite}

  /* ── empty state ── */
  .rest{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;gap:24px;transition:opacity .22s var(--ease)}
  .rest.gone{opacity:0;pointer-events:none}
  pre.art{margin:0;font-family:var(--mono);font-size:6.5px;line-height:1.05;
    color:var(--muted);white-space:pre;opacity:0;
    animation:fadeArt .8s var(--ease) .1s forwards}
  .rest p{margin:0;font-size:16px;color:var(--muted);max-width:34ch;
    opacity:0;animation:rise .6s var(--ease) .28s forwards}

  .chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:520px}
  .chip{font-family:var(--font);font-size:14px;color:var(--muted);
    background:transparent;border:1px solid var(--line);border-radius:9px;
    padding:7px 13px;cursor:pointer;
    opacity:0;transform:translateY(6px);animation:rise .45s var(--ease) forwards;
    transition:color .15s var(--ease),border-color .15s var(--ease),
               background .15s var(--ease),transform .12s var(--ease);}
  @media(hover:hover) and (pointer:fine){
    .chip:hover{color:var(--ink);border-color:var(--line-2);background:var(--hover)}}
  .chip:active{transform:scale(.97)}

  /* ── composer ── */
  .composer{padding:12px 0 26px}
  .box{display:flex;align-items:flex-end;gap:10px;background:var(--panel);
    border:1px solid var(--line);border-radius:18px;padding:9px 9px 9px 16px;
    box-shadow:0 1px 2px rgba(0,0,0,.04);
    transition:border-color .18s var(--ease),box-shadow .18s var(--ease)}
  .box:focus-within{border-color:var(--line-2);box-shadow:0 0 0 4px var(--ring)}
  textarea{flex:1;border:0;outline:0;resize:none;background:transparent;color:var(--ink);
    font-family:var(--font);font-size:15.5px;line-height:1.55;max-height:170px;padding:6px 0}
  textarea::placeholder{color:var(--faint)}
  .send{flex:none;width:34px;height:34px;border-radius:50%;border:0;cursor:pointer;
    background:var(--ink);color:var(--bg);display:grid;place-items:center;
    transition:transform .14s var(--ease),opacity .16s var(--ease),background .16s var(--ease)}
  .send svg{width:16px;height:16px}
  .send:active{transform:scale(.9)}
  .send:disabled{opacity:.32;cursor:default}
  .send.stop{background:var(--hover);color:var(--ink);box-shadow:inset 0 0 0 1px var(--line-2)}

  .controls{display:flex;align-items:center;gap:18px;margin-top:12px;padding:0 6px;
    font-size:12.5px;color:var(--faint)}
  .ctl{display:flex;align-items:center;gap:8px}
  .ctl b{color:var(--muted);font-weight:500;min-width:26px;font-variant-numeric:tabular-nums}
  input[type=range]{-webkit-appearance:none;appearance:none;height:2px;width:84px;
    background:var(--line-2);border-radius:2px;outline:0;cursor:pointer}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;
    border-radius:50%;background:var(--ink);cursor:pointer;transition:transform .14s var(--ease)}
  input[type=range]::-webkit-slider-thumb:active{transform:scale(1.3)}
  .hint{margin-left:auto;color:var(--faint)}
  kbd{font-family:var(--font);font-size:11px;color:var(--muted);background:var(--hover);
    border:1px solid var(--line);border-radius:5px;padding:1px 5px}

  @keyframes rise{to{opacity:1;transform:translateY(0)}}
  @keyframes fadeArt{to{opacity:.85}}
  @keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}

  @media(prefers-reduced-motion:reduce){
    *{animation-duration:.001ms!important;transition-duration:.001ms!important;transform:none!important}
    pre.art,.rest p,.passage,.chip{opacity:1!important}
  }
  @media(max-width:560px){header .meta{display:none}pre.art{font-size:5px}}
</style>
</head>
<body>
  <div class="app">
    <header>
      <span class="mark"></span>
      <h1>Posaidon</h1>
      <span class="meta">15.7M · MLX · Greek myth</span>
      <button class="iconbtn" id="theme" title="Toggle theme" aria-label="Toggle theme">
        <svg class="i-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>
        <svg class="i-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4.2"/>
          <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      </button>
    </header>

    <div class="scroll" id="scroll">
      <div class="rest" id="rest">
        <pre class="art" id="art"></pre>
        <p>Offer an opening line. The oracle will carry it onward.</p>
        <div class="chips" id="chips"></div>
      </div>
      <div id="transcript"></div>
    </div>

    <div class="composer">
      <div class="box">
        <textarea id="input" rows="1" placeholder="Poseidon, lord of the sea, …" autofocus></textarea>
        <button class="send" id="send" title="Send  ·  Enter" aria-label="Send">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 19V5M5 12l7-7 7 7"/></svg>
        </button>
      </div>
      <div class="controls">
        <div class="ctl"><span>temp</span>
          <input type="range" id="temp" min="0" max="1.3" step="0.05" value="0.8">
          <b id="tempv">0.80</b></div>
        <div class="ctl"><span>length</span>
          <input type="range" id="len" min="60" max="600" step="20" value="240">
          <b id="lenv">240</b></div>
        <span class="hint"><kbd>↵</kbd> send · <kbd>⇧↵</kbd> newline</span>
      </div>
    </div>
  </div>

<script>
const $=s=>document.querySelector(s);
const scroll=$("#scroll"),transcript=$("#transcript"),rest=$("#rest"),
      input=$("#input"),send=$("#send");
let busy=false,controller=null,started=false;
const ICON_SEND=send.innerHTML;
const ICON_STOP='<svg viewBox="0 0 24 24" fill="currentColor"><rect x="7" y="7" width="10" height="10" rx="2"/></svg>';

fetch("/api/art").then(r=>r.text()).then(t=>{$("#art").textContent=t.replace(/\s+$/,"")});

const starters=[
  "Poseidon, lord of the sea,",
  "In the age before the gods were named,",
  "The wrath of Achilles",
  "And so the heroes set sail for",
];
const chips=$("#chips");
starters.forEach((s,i)=>{
  const c=document.createElement("button");
  c.className="chip";c.textContent=s;c.style.animationDelay=(180+i*55)+"ms";
  c.onclick=()=>{input.value=s;autosize();summon()};
  chips.appendChild(c);
});

const root=document.documentElement,body=document.body;
$("#theme").addEventListener("click",()=>{
  const next=root.dataset.theme==="dark"?"light":"dark";
  body.classList.add("theming");
  root.dataset.theme=next;localStorage.posaidonTheme=next;
  setTimeout(()=>body.classList.remove("theming"),300);
});

$("#temp").oninput=e=>$("#tempv").textContent=(+e.target.value).toFixed(2);
$("#len").oninput=e=>$("#lenv").textContent=e.target.value;

function autosize(){input.style.height="auto";
  input.style.height=Math.min(input.scrollHeight,170)+"px"}
input.addEventListener("input",autosize);
input.addEventListener("keydown",e=>{
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();summon()}});
send.addEventListener("click",()=>busy?stop():summon());

function stop(){controller&&controller.abort()}
function setBusy(on){busy=on;send.classList.toggle("stop",on);
  send.innerHTML=on?ICON_STOP:ICON_SEND;send.title=on?"Stop":"Send  ·  Enter"}
function atBottom(){return scroll.scrollHeight-scroll.scrollTop-scroll.clientHeight<80}

async function summon(){
  if(busy)return;
  const prompt=input.value.trim();
  if(!prompt)return;
  if(!started){started=true;rest.classList.add("gone");
    setTimeout(()=>rest.style.display="none",240)}
  input.value="";autosize();

  const art=document.createElement("article");art.className="passage";
  const r=document.createElement("div");r.className="reading";
  const seed=document.createElement("span");seed.className="seed";seed.textContent=prompt;
  const flow=document.createElement("span");flow.className="flow";
  const cur=document.createElement("span");cur.className="cursor";cur.textContent="▍";
  r.append(seed,flow,cur);art.append(r);transcript.append(art);
  scroll.scrollTop=scroll.scrollHeight;
  setBusy(true);

  controller=new AbortController();
  try{
    const res=await fetch("/api/generate",{method:"POST",
      headers:{"Content-Type":"application/json"},signal:controller.signal,
      body:JSON.stringify({prompt,temperature:+$("#temp").value,
        max_new_tokens:+$("#len").value,top_k:40})});
    const reader=res.body.getReader(),dec=new TextDecoder();let buf="";
    for(;;){
      const{value,done}=await reader.read();if(done)break;
      buf+=dec.decode(value,{stream:true});
      const parts=buf.split("\n\n");buf=parts.pop();
      for(const p of parts){
        const line=p.replace(/^data: /,"");if(!line)continue;
        const msg=JSON.parse(line);
        if(msg.delta){const stick=atBottom();
          flow.appendChild(document.createTextNode(msg.delta));
          if(stick)scroll.scrollTop=scroll.scrollHeight}
      }
    }
  }catch(e){if(e.name!=="AbortError")flow.append(" — the line to the deep went quiet.")}
  finally{cur.remove();setBusy(false);controller=null;input.focus()}
}
</script>
</body>
</html>
